static_resources:
  listeners:
    - address:
        socket_address:
          address: 0.0.0.0
          port_value: 9001
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                generate_request_id: false
                codec_type: AUTO
                stat_prefix: ingress_grpc
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: backend
                      domains:
                        - "*"
                      routes:
                        - match:
                            prefix: "/"
                            grpc: {}
                          route:
                            cluster: backend_grpc_service
                            timeout: 180s
                http2_protocol_options: {}
                http_filters:
                  - name: envoy.filters.http.arsenal_model_serving_stats
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.model_serving_stats.FilterConfig
                      models: ${models}
                      model_repo: ${repo}
                      replace_dots_in_grpc_service_name: true
                      enable_response_stats: true
                      individual_method_stats_allowlist:
                        services:
                          - name: inference.GRPCInferenceService
                            method_names: ModelInfer
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                      dynamic_stats: false
    - address:
        socket_address:
          address: 0.0.0.0
          port_value: 34903
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                generate_request_id: false
                stat_prefix: ingress_http
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: backend
                      domains:
                        - "*"
                      routes:
                        - match:
                            prefix: "/metrics"
                          route:
                            cluster: envoy-stats
                            prefix_rewrite: "/stats/prometheus"
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
                      dynamic_stats: false
  clusters:
    - name: backend_grpc_service
      type: STATIC
      lb_policy: ROUND_ROBIN
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: backend_grpc_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: 127.0.0.1
                      port_value: 8000
    - name: envoy-stats
      connect_timeout: 0.25s
      type: STATIC
      load_assignment:
        cluster_name: envoy-stats
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: 127.0.0.1
                      port_value: 9901
admin:
  address:
    socket_address:
      address: 127.0.0.1
      port_value: 9901
